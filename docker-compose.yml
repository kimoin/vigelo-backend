services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: vsrv
      POSTGRES_USER: vsrv
      POSTGRES_PASSWORD: vsrv
    ports:
      - "5433:5432"
    volumes:
      - vsrv-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vsrv -d vsrv"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  vsrv-postgres:
