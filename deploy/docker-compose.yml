# Production deployment for the VSRV UpCloud VM.
# Postgres is internal; Caddy terminates TLS for the public API.
# VNMS runs on a separate VM — set VNMS_BASE_URL to its private-network address.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vsrv}
      POSTGRES_USER: ${POSTGRES_USER:-vsrv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
    volumes:
      - vsrv-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  migrate:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
      POSTGRES_USER: ${POSTGRES_USER:-vsrv}
      POSTGRES_DB: ${POSTGRES_DB:-vsrv}
    volumes:
      - ../migrations:/migrations:ro
    entrypoint:
      - bash
      - -c
      - |
        set -e
        for f in /migrations/*.sql; do
          echo "applying $$f"
          psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 -f "$$f"
        done
    restart: "no"

  vsrv:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      VSRV_ADDR: ":8090"
      VSRV_DATABASE_URL: postgres://${POSTGRES_USER:-vsrv}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vsrv}?sslmode=disable
      VSRV_PUBLIC_URL: ${VSRV_PUBLIC_URL:-}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-}
      VSRV_CORS_ORIGIN: ${VSRV_CORS_ORIGIN:-}
      VSRV_LOG_LEVEL: ${VSRV_LOG_LEVEL:-info}
      OFFLINE_THRESHOLD_HOURS: ${OFFLINE_THRESHOLD_HOURS:-3}
      DEFAULT_TRIAL_DAYS: ${DEFAULT_TRIAL_DAYS:-30}
      VNMS_BASE_URL: ${VNMS_BASE_URL:?set VNMS_BASE_URL in deploy/.env}
      VNMS_HTTP_TOKEN: ${VNMS_HTTP_TOKEN:?set VNMS_HTTP_TOKEN in deploy/.env}
      VNMS_TLS_CA: ${VNMS_TLS_CA:-}
      MAILERSEND_API_TOKEN: ${MAILERSEND_API_TOKEN:-}
      MAILERSEND_FROM_EMAIL: ${MAILERSEND_FROM_EMAIL:-notify@vigelo.fi}
      MAILERSEND_FROM_NAME: ${MAILERSEND_FROM_NAME:-Vigelo}
      GATEWAYAPI_TOKEN: ${GATEWAYAPI_TOKEN:-}
      GATEWAYAPI_SENDER: ${GATEWAYAPI_SENDER:-Vigelo}
      PUSH_PROVIDER: ${PUSH_PROVIDER:-log}
      NTFY_BASE_URL: ${NTFY_BASE_URL:-https://ntfy.sh}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-}
      APNS_SANDBOX: ${APNS_SANDBOX:-false}
      VSRV_ADMIN_EMAILS: ${VSRV_ADMIN_EMAILS:-}
      VSRV_AUDIT_RETENTION_DAYS: ${VSRV_AUDIT_RETENTION_DAYS:-60}
      VSRV_ACCESS_TOKEN_TTL_HOURS: ${VSRV_ACCESS_TOKEN_TTL_HOURS:-1}
      VSRV_REFRESH_TOKEN_TTL_DAYS: ${VSRV_REFRESH_TOKEN_TTL_DAYS:-30}
      VSRV_INVITE_TTL_DAYS: ${VSRV_INVITE_TTL_DAYS:-7}
      VSRV_VERIFY_EMAIL_TTL_HOURS: ${VSRV_VERIFY_EMAIL_TTL_HOURS:-48}
      VSRV_RESET_PASSWORD_TTL_HOURS: ${VSRV_RESET_PASSWORD_TTL_HOURS:-2}
      VSRV_PROC_ROOT: /host/proc
    volumes:
      - ./certs:/certs:ro
      - /proc:/host/proc:ro
    expose:
      - "8090"
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - vsrv
    ports:
      - "80:80"
      - "443:443"
    environment:
      VSRV_HOSTNAME: ${VSRV_HOSTNAME:?set VSRV_HOSTNAME in deploy/.env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  vsrv-postgres:
  caddy-data:
  caddy-config:
