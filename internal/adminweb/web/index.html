<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vigelo VSRV Admin</title>
  <style>
    :root {
      --bg: #eef2ff;
      --card: rgba(255, 255, 255, 0.94);
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(148, 163, 184, 0.32);
      --blue: #2563eb;
      --blue-deep: #1d4ed8;
      --cyan: #06b6d4;
      --cyan-deep: #0891b2;
      --yellow: #eab308;
      --yellow-deep: #ca8a04;
      --red: #ef4444;
      --red-deep: #dc2626;
      --accent: #2563eb;
      --accent-2: #06b6d4;
      --gradient-primary: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
      --gradient-cool: linear-gradient(135deg, #06b6d4 0%, #6366f1 100%);
      --gradient-warm: linear-gradient(135deg, #eab308 0%, #ef4444 100%);
      --gradient-sky: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
      --gradient-amber: linear-gradient(135deg, #fde047 0%, #f59e0b 100%);
      --gradient-rose: linear-gradient(135deg, #fb7185 0%, #ef4444 100%);
      --gradient-soft-blue: linear-gradient(135deg, rgba(37, 99, 235, 0.1) 0%, rgba(6, 182, 212, 0.14) 100%);
      --gradient-soft-cyan: linear-gradient(135deg, rgba(6, 182, 212, 0.12) 0%, rgba(99, 102, 241, 0.1) 100%);
      --gradient-soft-yellow: linear-gradient(135deg, rgba(234, 179, 8, 0.14) 0%, rgba(245, 158, 11, 0.1) 100%);
      --gradient-soft-red: linear-gradient(135deg, rgba(239, 68, 68, 0.12) 0%, rgba(244, 63, 94, 0.1) 100%);
      --ok: #0891b2;
      --warn: #d97706;
      --err: #dc2626;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 8px 24px rgba(37, 99, 235, 0.07);
      --shadow-lg: 0 16px 48px rgba(15, 23, 42, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      line-height: 1.45;
      min-height: 100vh;
      background: linear-gradient(165deg, #eef2ff 0%, #f8fafc 38%, #ecfeff 72%, #fffbeb 100%);
      background-attachment: fixed;
    }
    header {
      padding: .85rem 1.5rem;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: var(--shadow);
    }
    header::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2px;
      background: var(--gradient-primary);
      opacity: .55;
    }
    h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    h2 { margin:0 0 1rem; font-size:1.25rem; font-weight:600; }
    .login h2 {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    h3, h4 { margin:0 0 .5rem; font-weight:600; }
    main { padding:1.25rem 1.5rem; max-width:1200px; margin:0 auto; }
    .card {
      background: var(--card);
      backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 1rem 1.15rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .login {
      max-width: 380px;
      margin: 4rem auto;
      border: 1px solid transparent;
      background:
        linear-gradient(var(--card), var(--card)) padding-box,
        var(--gradient-primary) border-box;
    }
    .tabs { display:flex; gap:.35rem; flex-wrap:wrap; }
    .tabs button {
      background:transparent; color:var(--muted); border:1px solid transparent;
      padding:.4rem .75rem; border-radius:8px; cursor:pointer; font-size:.875rem; font-weight:500;
      transition: background .15s ease, color .15s ease, box-shadow .15s ease, transform .15s ease;
    }
    .tabs button:hover { color:var(--text); background:rgba(255,255,255,.75); }
    .tabs button.active {
      color:#fff; border-color:transparent;
      box-shadow:0 4px 14px rgba(37,99,235,.28);
      transform:translateY(-1px);
    }
    .tabs button.active.tab-tone-blue { background:var(--gradient-primary); }
    .tabs button.active.tab-tone-cyan { background:var(--gradient-cool); box-shadow:0 4px 14px rgba(6,182,212,.28); }
    .tabs button.active.tab-tone-warm { background:var(--gradient-warm); box-shadow:0 4px 14px rgba(234,179,8,.28); }
    input, select, textarea {
      padding:.45rem .65rem; border-radius:8px; border:1px solid var(--border);
      background:#fff; color:var(--text); font-size:.875rem; font-family:inherit;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input:focus, select:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.14); }
    button.action {
      padding:.45rem .75rem; border-radius:8px; border:none;
      background:var(--gradient-primary); color:#fff;
      font-size:.875rem; font-weight:600; cursor:pointer; font-family:inherit;
      box-shadow:0 2px 10px rgba(37,99,235,.22);
      transition: filter .15s ease, box-shadow .15s ease, transform .15s ease;
    }
    button.action:hover { filter:brightness(1.06); box-shadow:0 4px 16px rgba(37,99,235,.32); transform:translateY(-1px); }
    button.action:disabled { opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }
    button.ghost {
      padding:.4rem .65rem; border-radius:8px; border:1px solid var(--border);
      background:rgba(255,255,255,.85); color:var(--text); font-size:.875rem; cursor:pointer; font-family:inherit;
      transition: background .15s ease, border-color .15s ease;
    }
    button.ghost:hover { background:#fff; border-color:rgba(37,99,235,.35); }
    button.danger { background:var(--gradient-rose); color:#fff; border:none; box-shadow:0 2px 10px rgba(239,68,68,.22); }
    button.danger:hover { filter:brightness(1.05); }
    button.danger.ghost { background:#fff; color:var(--red-deep); border-color:#fecaca; box-shadow:none; }
    button.icon-btn { padding:.25rem .45rem; min-width:1.75rem; line-height:1; }
    .muted { color:var(--muted); font-size:.85rem; }
    .status-ok { color:var(--ok); }
    .status-down, .status-fail { color:var(--err); }
    .status-misconfigured { color:var(--err); }
    .status-log_only, .status-not_active, .status-stub, .status-warn { color:var(--warn); }
    .hidden { display:none !important; }
    .row { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:.75rem; align-items:center; }
    .login h2 { margin-bottom:.35rem; }
    table { width:100%; border-collapse:collapse; font-size:.875rem; }
    th, td { text-align:left; padding:.55rem .65rem; border-bottom:1px solid var(--border); vertical-align:middle; }
    th { color:var(--muted); font-weight:500; font-size:.8rem; text-transform:uppercase; letter-spacing:.02em; }
    tr.user-row { cursor:pointer; transition:background .12s; }
    tr.user-row:hover { background:rgba(37,99,235,.05); }
    tr.user-row.expanded { background:var(--gradient-soft-blue); }
    .row-chevron {
      display:inline-block; width:.85rem;
      background:var(--gradient-primary);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      font-size:.62rem; line-height:1; vertical-align:middle; transition:transform .15s ease;
    }
    tr.user-row.expanded .row-chevron { transform:rotate(90deg); }
    .chip {
      display:inline-block; padding:.12rem .45rem; border-radius:999px;
      background:rgba(255,255,255,.8); font-size:.75rem; font-weight:500; margin-right:.2rem;
    }
    .chip.admin {
      background:var(--gradient-soft-blue);
      color:var(--blue-deep);
      border:1px solid rgba(37,99,235,.22);
    }
    .chip.status-registered { background:var(--gradient-soft-cyan); color:#0e7490; border:1px solid rgba(6,182,212,.35); }
    .chip.status-invited { background:var(--gradient-soft-yellow); color:#a16207; border:1px solid rgba(234,179,8,.35); }
    .chip.status-failed { background:var(--gradient-soft-red); color:#b91c1c; border:1px solid rgba(239,68,68,.35); }
    .audit-line { padding:.4rem 0; border-bottom:1px solid var(--border); font-size:.875rem; }
    .counts { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:.75rem; }
    .counts.manage-counts { margin-bottom:1rem; }
    .count {
      position:relative; overflow:hidden;
      background:var(--card); border:1px solid var(--border);
      padding:.85rem; border-radius:12px; box-shadow:var(--shadow);
    }
    .count::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
    }
    .count strong {
      display:block; font-size:1.5rem; font-weight:700; margin-bottom:.15rem; line-height:1.2;
    }
    .count-tone-blue::before { background:var(--gradient-primary); }
    .count-tone-blue strong { color:var(--blue); }
    .count-tone-cyan::before { background:var(--gradient-cool); }
    .count-tone-cyan strong { color:var(--cyan-deep); }
    .count-tone-yellow::before { background:var(--gradient-amber); }
    .count-tone-yellow strong { color:var(--yellow-deep); }
    .count-tone-red::before { background:var(--gradient-rose); }
    .count-tone-red strong { color:var(--red-deep); }
    .toolbar { display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; margin-bottom:1rem; }
    .toolbar input[type="search"], .toolbar input[type="text"] { flex:1; min-width:160px; }
    .gauge-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:.75rem; margin-bottom:1.25rem; }
    .gauge-card {
      position:relative; overflow:hidden;
      background:var(--card); border:1px solid var(--border); border-radius:14px;
      padding:.65rem .5rem .5rem; text-align:center; box-shadow:var(--shadow);
    }
    .gauge-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
    }
    .gauge-tone-0::before { background:var(--gradient-primary); }
    .gauge-tone-1::before { background:var(--gradient-cool); }
    .gauge-tone-2::before { background:var(--gradient-amber); }
    .gauge-tone-3::before { background:var(--gradient-sky); }
    .gauge-card .gauge-title { font-size:.8rem; font-weight:600; margin-bottom:.15rem; }
    .gauge-card .gauge-detail { font-size:.72rem; color:var(--muted); min-height:1rem; }
    .gauge-card .gauge-pct { font-size:.95rem; font-weight:700; fill:var(--text); }
    .gauge-svg { width:100%; max-width:130px; height:auto; display:block; margin:0 auto; }
    .status-grid {
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:.45rem;
    }
    .status-card {
      background:var(--card); border-radius:10px; padding:.45rem .55rem; border:1px solid var(--border);
      box-shadow:var(--shadow); min-height:0; display:flex; flex-direction:column; gap:.2rem;
      border-top:3px solid transparent;
    }
    .status-card:has(.status-ok) { border-top-color:#06b6d4; }
    .status-card:has(.status-down), .status-card:has(.status-fail), .status-card:has(.status-misconfigured) { border-top-color:#ef4444; }
    .status-card:has(.status-warn), .status-card:has(.status-log_only), .status-card:has(.status-not_active), .status-card:has(.status-stub) { border-top-color:#eab308; }
    .status-card strong { font-size:.78rem; font-weight:600; line-height:1.2; }
    .status-card .status-label { font-size:.8rem; font-weight:600; text-transform:lowercase; line-height:1.2; }
    .status-card .muted {
      font-size:.68rem; line-height:1.35;
      word-wrap:break-word; overflow-wrap:anywhere; white-space:normal;
    }
    .user-menu { position:relative; margin-left:auto; z-index:51; }
    .user-menu-trigger {
      background:#fff; border:1px solid var(--border); color:var(--text);
      padding:.4rem .65rem; border-radius:8px; cursor:pointer; font-size:.85rem;
      display:flex; align-items:center; gap:.35rem;
    }
    .user-menu-trigger:hover { border-color:rgba(37,99,235,.45); }
    .user-menu-chevron {
      background:var(--gradient-primary);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      font-size:.62rem; line-height:1;
      transition:transform .15s ease;
    }
    .user-menu-trigger[aria-expanded="true"] .user-menu-chevron { transform:rotate(180deg); }
    .user-menu-panel {
      position:absolute; right:0; top:calc(100% + .35rem); min-width:280px;
      background:var(--card); border:1px solid var(--border); border-radius:12px;
      padding:1rem; z-index:52; box-shadow:var(--shadow-lg);
    }
    .user-menu-panel h4 { margin:0 0 .65rem; font-size:.9rem; }
    .user-menu-panel input { width:100%; }
    .tree { margin-top:.75rem; }
    details.tree-node { border:1px solid var(--border); border-radius:12px; margin-bottom:.5rem; background:rgba(255,255,255,.88); }
    details.tree-node > summary {
      padding:.65rem .85rem; cursor:pointer; font-weight:600; font-size:.9rem;
      list-style:none; display:flex; align-items:center; gap:.45rem; flex-wrap:wrap;
      transition: background .15s ease;
    }
    details.tree-node[open] > summary { background:var(--gradient-soft-blue); }
    details.tree-node > summary::-webkit-details-marker { display:none; }
    details.tree-node > summary::marker { content:none; }
    details.tree-node > summary::before {
      content:'▶';
      flex-shrink:0;
      width:.85rem;
      background:var(--gradient-primary);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      font-size:.62rem;
      line-height:1;
      transition:transform .15s ease;
    }
    details.tree-node[open] > summary::before { transform:rotate(90deg); }
    details.tree-node .tree-body { padding:0 .85rem .85rem; border-top:1px solid var(--border); }
    details.tree-node.nested { margin-left:.75rem; background:#fafafa; }
    .tree-actions { margin-left:auto; display:flex; gap:.35rem; flex-wrap:wrap; }
    .meta-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:.45rem; margin:.5rem 0; }
    .meta-item { background:#fafafa; border:1px solid var(--border); padding:.45rem .6rem; border-radius:8px; font-size:.82rem; }
    .meta-item strong { display:block; font-size:.72rem; color:var(--muted); font-weight:500; text-transform:uppercase; letter-spacing:.03em; }
    .form-inline { display:flex; gap:.35rem; flex-wrap:wrap; align-items:center; margin:.5rem 0; padding:.55rem; background:#fafafa; border-radius:8px; border:1px dashed var(--border); }
    .form-inline input, .form-inline select { min-width:100px; }
    .banner { padding:.45rem .65rem; border-radius:8px; margin:.35rem 0; font-size:.85rem; }
    .banner-trial { background:var(--gradient-soft-yellow); border:1px solid rgba(234,179,8,.35); color:#92400e; }
    .banner-paid { background:var(--gradient-soft-cyan); border:1px solid rgba(6,182,212,.35); color:#0e7490; }
    .banner-bad { background:var(--gradient-soft-red); border:1px solid rgba(239,68,68,.35); color:#991b1b; }
    .banner-none { background:#fafafa; border:1px solid var(--border); color:var(--muted); }
    .member-row { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; margin:.3rem 0; font-size:.875rem; }
    .payment-row {
      display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; padding:.55rem 0;
      border-bottom:1px solid var(--border); font-size:.875rem;
    }
    .payment-row:last-child { border-bottom:none; }
    .modal {
      position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center; padding:1rem;
    }
    .modal-backdrop { position:absolute; inset:0; background:rgba(24,24,27,.35); }
    .modal-card {
      position:relative; background:var(--card); border-radius:14px; padding:1.25rem;
      width:100%; max-width:420px; box-shadow:var(--shadow-lg); border:1px solid var(--border);
    }
    .modal-card h3 { margin-bottom:.75rem; }
    .modal-card label { display:block; font-size:.82rem; color:var(--muted); margin-bottom:.2rem; margin-top:.5rem; }
    .modal-card input, .modal-card select { width:100%; margin-bottom:.25rem; }
    .modal-actions { display:flex; gap:.5rem; justify-content:flex-end; margin-top:1rem; }
    .section-head { display:flex; align-items:center; gap:.5rem; margin-bottom:.5rem; flex-wrap:wrap; }
    .section-head h4 { margin:0; flex:1; }
    .add-form-panel { margin-bottom:.5rem; }
    .pagination {
      display:flex; align-items:center; gap:.5rem; flex-wrap:wrap;
      padding:.65rem .85rem; font-size:.875rem;
      border-top:1px solid var(--border);
      background:linear-gradient(135deg, rgba(255,255,255,.92) 0%, rgba(238,242,255,.88) 100%);
    }
    .pagination-spacer { flex:1; min-width:.5rem; }
    .pagination select { min-width:4.5rem; }
    .time-mgmt { margin:.5rem 0; padding:.55rem; background:#fff; border:1px solid var(--border); border-radius:8px; }
    .time-mgmt label { font-size:.78rem; color:var(--muted); margin-right:.35rem; }
    .removed-devices-list { display:flex; flex-direction:column; gap:.35rem; }
    .removed-device-row {
      display:block; padding:.45rem .55rem; background:#fff;
      border:1px solid var(--border); border-radius:8px; font-size:.85rem; line-height:1.4;
    }
    .removed-device-row strong { display:block; font-weight:600; color:var(--text); }
    @media (max-width:640px) {
      main { padding:1rem; }
      header { padding:.75rem 1rem; }
      .status-grid { grid-template-columns:repeat(2, minmax(0, 1fr)); }
    }
    @media (min-width:900px) {
      .status-grid { grid-template-columns:repeat(6, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div id="login-view" class="login card">
    <h2>VSRV Admin</h2>
    <p class="muted">Sign in with an account listed in <code>VSRV_ADMIN_EMAILS</code>.</p>
    <div class="row"><input id="email" type="email" placeholder="Email" style="flex:1" /></div>
    <div class="row"><input id="password" type="password" placeholder="Password" style="flex:1" /></div>
    <div class="row"><button class="action" id="login-btn">Sign in</button></div>
    <p id="login-error" class="status-down"></p>
  </div>

  <div id="app-view" class="hidden">
    <header>
      <h1>Vigelo VSRV Admin</h1>
      <nav class="tabs" id="tabs"></nav>
      <div class="user-menu" id="user-menu">
        <button type="button" class="user-menu-trigger" id="admin-user-btn" aria-expanded="false">
          <span id="admin-user"></span>
          <span aria-hidden="true" class="user-menu-chevron">▼</span>
        </button>
        <div class="user-menu-panel hidden" id="user-menu-panel">
          <h4>Change password</h4>
          <div class="row"><input id="pw-current" type="password" placeholder="Current password" autocomplete="current-password" /></div>
          <div class="row"><input id="pw-new" type="password" placeholder="New password (min 8)" autocomplete="new-password" /></div>
          <div class="row"><input id="pw-confirm" type="password" placeholder="Confirm new password" autocomplete="new-password" /></div>
          <div class="row"><button class="action" id="pw-save-btn" type="button">Update password</button></div>
          <p id="pw-change-msg" class="muted"></p>
        </div>
      </div>
      <button class="action" id="logout-btn">Logout</button>
    </header>
    <main id="panel"></main>
  </div>

  <div id="add-user-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-card">
      <h3>Add user</h3>
      <p class="muted" style="margin:0 0 .75rem">Creates a verified account (no invite email). Console admin access still requires <code>VSRV_ADMIN_EMAILS</code>.</p>
      <label for="modal-user-email">Email</label>
      <input id="modal-user-email" type="email" autocomplete="off" />
      <label for="modal-user-password">Password (min 8)</label>
      <input id="modal-user-password" type="password" autocomplete="new-password" />
      <label for="modal-user-name">Display name</label>
      <input id="modal-user-name" type="text" autocomplete="off" />
      <label for="modal-user-type">Account type</label>
      <select id="modal-user-type">
        <option value="user">End user</option>
        <option value="admin">Admin (add to .env)</option>
      </select>
      <p id="modal-user-msg" class="muted"></p>
      <div class="modal-actions">
        <button type="button" class="ghost" data-modal-close>Cancel</button>
        <button type="button" class="action" id="modal-create-user">Create account</button>
      </div>
    </div>
  </div>

<script>
const API = localStorage.getItem('vsrv_api_base') || location.origin;
let token = localStorage.getItem('vsrv_admin_token') || '';
const tabs = [
  { id:'status', label:'Status' },
  { id:'manage', label:'Manage' },
  { id:'audit', label:'Audit log' },
];
let activeTab = 'status';
let expandedUserId = null;
let userSearchQ = '';
let userFilter = 'email';
let manageLimit = 25;
let manageOffset = 0;
let auditSearchQ = '';
let auditLimit = 25;
let auditOffset = 0;
let meUserId = '';
let userMenuBound = false;
let statusTimer = null;

async function api(path, opts={}) {
  const headers = { 'Content-Type':'application/json', ...(opts.headers||{}) };
  if (token) headers.Authorization = 'Bearer ' + token;
  const res = await fetch(API + path, { ...opts, headers });
  const text = await res.text();
  let body = {};
  try { body = text ? JSON.parse(text) : {}; } catch { body = { raw:text }; }
  if (!res.ok) throw new Error(body?.error?.message || res.statusText);
  return body;
}

function show(el, on) { el.classList.toggle('hidden', !on); }

function fmt(ts) { return ts ? new Date(ts).toLocaleString() : '—'; }
function fmtDate(ts) { return ts ? new Date(ts).toLocaleDateString() : '—'; }
function esc(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatBytes(n) {
  if (n == null || n === '' || isNaN(Number(n))) return '—';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let v = Number(n);
  let i = 0;
  while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return (i ? v.toFixed(1) : Math.round(v)) + ' ' + units[i];
}

function paginationMeta(total, limit, offset) {
  const pages = Math.max(1, Math.ceil((total || 0) / limit) || 1);
  const page = Math.floor(offset / limit) + 1;
  if (total === 0) return { from: 0, to: 0, page: 1, pages: 1 };
  return {
    from: offset + 1,
    to: Math.min(offset + limit, total),
    page: Math.min(page, pages),
    pages,
  };
}

function renderPagination(scope, total, limit, offset) {
  const { from, to, page, pages } = paginationMeta(total, limit, offset);
  const canPrev = offset > 0;
  const canNext = offset + limit < total;
  return `<div class="pagination" data-pagination="${scope}">
    <span class="muted">${total ? `Showing ${from}–${to} of ${total}` : 'No results'}</span>
    <span class="pagination-spacer"></span>
    <label class="muted">Per page</label>
    <select data-page-limit="${scope}">
      <option value="25" ${limit === 25 ? 'selected' : ''}>25</option>
      <option value="100" ${limit === 100 ? 'selected' : ''}>100</option>
    </select>
    <button type="button" class="ghost" data-page-prev="${scope}" ${canPrev ? '' : 'disabled'}>Previous</button>
    <span class="muted">Page ${page} / ${pages}</span>
    <button type="button" class="ghost" data-page-next="${scope}" ${canNext ? '' : 'disabled'}>Next</button>
  </div>`;
}

function bindPagination(panel) {
  panel.querySelectorAll('[data-page-limit]').forEach(sel => {
    sel.onchange = async () => {
      const scope = sel.dataset.pageLimit;
      const limit = parseInt(sel.value, 10) || 25;
      if (scope === 'manage') {
        manageLimit = limit;
        manageOffset = 0;
        expandedUserId = null;
        panel.innerHTML = await renderManage();
      } else if (scope === 'audit') {
        auditLimit = limit;
        auditOffset = 0;
        panel.innerHTML = await renderAudit();
      }
      bindPanelActions();
    };
  });
  panel.querySelectorAll('[data-page-prev]').forEach(btn => {
    btn.onclick = async () => {
      const scope = btn.dataset.pagePrev;
      if (scope === 'manage') {
        manageOffset = Math.max(0, manageOffset - manageLimit);
        expandedUserId = null;
        panel.innerHTML = await renderManage();
      } else if (scope === 'audit') {
        auditOffset = Math.max(0, auditOffset - auditLimit);
        panel.innerHTML = await renderAudit();
      }
      bindPanelActions();
    };
  });
  panel.querySelectorAll('[data-page-next]').forEach(btn => {
    btn.onclick = async () => {
      const scope = btn.dataset.pageNext;
      if (scope === 'manage') {
        manageOffset += manageLimit;
        expandedUserId = null;
        panel.innerHTML = await renderManage();
      } else if (scope === 'audit') {
        auditOffset += auditLimit;
        panel.innerHTML = await renderAudit();
      }
      bindPanelActions();
    };
  });
}

function needleGauge(pct, title, detail, toneIdx = 0) {
  const p = Math.max(0, Math.min(100, Number(pct) || 0));
  const cx = 50, cy = 52, r = 38;
  const angleDeg = 180 - (p / 100) * 180;
  const rad = (angleDeg * Math.PI) / 180;
  const nx = cx + r * Math.cos(rad);
  const ny = cy - r * Math.sin(rad);
  const arcEndDeg = 180 - (p / 100) * 180;
  const arcRad = (arcEndDeg * Math.PI) / 180;
  const ax = cx + r * Math.cos(arcRad);
  const ay = cy - r * Math.sin(arcRad);
  const large = p > 50 ? 1 : 0;
  const tones = ['#2563eb', '#06b6d4', '#eab308', '#38bdf8'];
  const color = p >= 90 ? '#ef4444' : p >= 75 ? '#f59e0b' : tones[toneIdx % tones.length];
  return `<div class="gauge-card gauge-tone-${toneIdx % 4}">
    <div class="gauge-title">${title}</div>
    <svg viewBox="0 0 100 62" class="gauge-svg" aria-hidden="true">
      <path d="M 12 52 A 38 38 0 0 1 88 52" fill="none" stroke="#e2e8f0" stroke-width="7" stroke-linecap="round"/>
      ${p > 0 ? `<path d="M 12 52 A 38 38 0 ${large} 1 ${ax.toFixed(2)} ${ay.toFixed(2)}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"/>` : ''}
      <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(2)}" y2="${ny.toFixed(2)}" stroke="#0f172a" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="3.5" fill="#0f172a"/>
      <text x="${cx}" y="44" text-anchor="middle" class="gauge-pct" font-size="11" font-weight="700">${Math.round(p)}%</text>
    </svg>
    <div class="gauge-detail">${detail || ''}</div>
  </div>`;
}

function clearStatusTimer() {
  if (statusTimer) { clearInterval(statusTimer); statusTimer = null; }
}

function closeUserMenu() {
  const panel = document.getElementById('user-menu-panel');
  const btn = document.getElementById('admin-user-btn');
  if (!panel || !btn) return;
  show(panel, false);
  btn.setAttribute('aria-expanded', 'false');
}

function toggleUserMenu() {
  const panel = document.getElementById('user-menu-panel');
  const btn = document.getElementById('admin-user-btn');
  if (!panel || !btn) return;
  const open = panel.classList.contains('hidden');
  show(panel, open);
  btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  if (open) {
    const msg = document.getElementById('pw-change-msg');
    if (msg) msg.textContent = '';
  }
}

function bindUserMenu() {
  if (userMenuBound) return;
  userMenuBound = true;
  document.getElementById('admin-user-btn')?.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleUserMenu();
  });
  document.getElementById('pw-save-btn')?.addEventListener('click', async () => {
    const current = document.getElementById('pw-current')?.value || '';
    const next = document.getElementById('pw-new')?.value || '';
    const confirm = document.getElementById('pw-confirm')?.value || '';
    const msg = document.getElementById('pw-change-msg');
    if (!current || next.length < 8) {
      if (msg) { msg.textContent = 'Enter current password and a new password (min 8 chars).'; msg.className = 'status-down'; }
      return;
    }
    if (next !== confirm) {
      if (msg) { msg.textContent = 'New passwords do not match.'; msg.className = 'status-down'; }
      return;
    }
    try {
      await api('/v1/auth/change-password', {
        method: 'POST',
        body: JSON.stringify({ current_password: current, new_password: next }),
      });
      ['pw-current', 'pw-new', 'pw-confirm'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      if (msg) { msg.textContent = 'Password updated.'; msg.className = 'status-ok'; }
      setTimeout(closeUserMenu, 1200);
    } catch (err) {
      if (msg) { msg.textContent = err.message; msg.className = 'status-down'; }
    }
  });
}

async function tryBoot() {
  if (!token) return showLogin();
  try {
    const me = await api('/v1/admin/me');
    if (!me.admin) throw new Error('Not an admin');
    document.getElementById('admin-user').textContent = me.user.email;
    meUserId = me.user.id;
    show(document.getElementById('login-view'), false);
    show(document.getElementById('app-view'), true);
    bindUserMenu();
    renderTabs();
    renderPanel();
  } catch {
    token = '';
    localStorage.removeItem('vsrv_admin_token');
    showLogin();
  }
}

function showLogin() {
  clearStatusTimer();
  show(document.getElementById('login-view'), true);
  show(document.getElementById('app-view'), false);
}

document.getElementById('login-btn').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  document.getElementById('login-error').textContent = '';
  try {
    const res = await api('/v1/auth/login', { method:'POST', body: JSON.stringify({ email, password }) });
    token = res.access_token;
    localStorage.setItem('vsrv_admin_token', token);
    await tryBoot();
  } catch (e) {
    document.getElementById('login-error').textContent = e.message;
  }
};

document.getElementById('logout-btn').onclick = () => {
  closeUserMenu();
  clearStatusTimer();
  token = '';
  localStorage.removeItem('vsrv_admin_token');
  showLogin();
};

function renderTabs() {
  const nav = document.getElementById('tabs');
  const tabTones = { status: 'tab-tone-blue', manage: 'tab-tone-cyan', audit: 'tab-tone-warm' };
  nav.innerHTML = tabs.map(t => {
    const active = t.id === activeTab;
    const tone = tabTones[t.id] || 'tab-tone-blue';
    return `<button class="${active ? 'active ' + tone : ''}" data-tab="${t.id}">${t.label}</button>`;
  }).join('');
  nav.querySelectorAll('button').forEach(b => b.onclick = () => {
    activeTab = b.dataset.tab;
    renderTabs();
    renderPanel();
  });
}

async function renderPanel() {
  clearStatusTimer();
  const panel = document.getElementById('panel');
  panel.innerHTML = '<p class="muted">Loading…</p>';
  try {
    if (activeTab === 'status') {
      panel.innerHTML = await renderStatus();
      bindPanelActions();
      statusTimer = setInterval(async () => {
        if (activeTab !== 'status') { clearStatusTimer(); return; }
        try {
          panel.innerHTML = await renderStatus();
          bindPanelActions();
        } catch (e) {
          panel.innerHTML = `<p class="status-down">${e.message}</p>`;
        }
      }, 8000);
    } else if (activeTab === 'manage') {
      panel.innerHTML = await renderManage();
      bindPanelActions();
    } else if (activeTab === 'audit') {
      panel.innerHTML = await renderAudit();
      bindPanelActions();
    }
  } catch (e) {
    panel.innerHTML = `<p class="status-down">${e.message}</p>`;
  }
}

async function refreshExpandedUser() {
  if (!expandedUserId) return renderPanel();
  const panel = document.getElementById('panel');
  panel.innerHTML = await renderManage();
  bindPanelActions();
}

function paymentBanner(d) {
  const summary = d.payment_summary || d.subscription_status || 'unknown';
  let cls = 'banner-none';
  if (d.cancelled_at) cls = 'banner-bad';
  else if (d.subscription_status === 'trialing') cls = 'banner-trial';
  else if (d.subscription_status === 'active') cls = 'banner-paid';
  else if (d.subscription_status === 'past_due' || d.service_status === 'service_suspended') cls = 'banner-bad';
  return `<span class="banner ${cls}" style="display:inline-block;margin:0">${summary}</span>`;
}

function collectCoMembers(u) {
  const seen = new Set();
  const out = [];
  for (const hh of u.households || []) {
    for (const m of hh.members || []) {
      if (m.user_id && m.user_id === u.id) continue;
      if (m.email && m.email.toLowerCase() === u.email.toLowerCase()) continue;
      const key = (m.user_id || m.invite_id || m.email) + '@' + hh.id;
      if (seen.has(key)) continue;
      seen.add(key);
      out.push({ ...m, household_id: hh.id, household_name: hh.name });
    }
  }
  return out;
}

function renderMemberChip(m) {
  const name = m.display_name ? `${m.email} (${m.display_name})` : m.email;
  let statusChip;
  if (m.status === 'registered') {
    statusChip = `<span class="chip status-registered">Registered · ${fmt(m.status_at)}</span>`;
  } else if (m.status === 'invited') {
    statusChip = `<span class="chip status-invited">Invited · ${fmt(m.invited_at || m.status_at)}</span>`;
    if (m.expires_at) statusChip += ` <span class="muted">expires ${fmt(m.expires_at)}</span>`;
  } else if (m.status === 'failed') {
    statusChip = `<span class="chip status-failed">Failed · ${fmt(m.expires_at || m.status_at)}</span>`;
  } else {
    statusChip = `<span class="chip">${m.status || 'unknown'}</span>`;
  }
  const removeBtn = m.user_id
    ? `<button class="ghost danger icon-btn" data-member-remove="${m.user_id}" data-hh-id="${m.household_id}" title="Remove member">✕</button>`
    : '';
  return `<div class="member-row">
    <span>${name}</span>
    <span class="chip">${m.role}</span>
    <span class="muted">${m.household_name}</span>
    ${statusChip}
    ${removeBtn}
  </div>`;
}

      </details>

      <details class="tree-node nested">
        <summary>Co-members</summary>
        <div class="tree-body">${renderCoMembersSection(u)}</div>
      </details>

      <details class="tree-node nested">
        <summary>Payments (${(u.subscriptions || []).length} devices)</summary>
        <div class="tree-body">${renderPaymentsSection(u)}</div>
      </details>
    </div>
  </details>`;
}

async function fetchMonitoredWindowsMap(u) {
  const windowsMap = {};
  const bindings = [];
  for (const hh of u.households || []) {
    for (const d of hh.devices || []) {
      if (!d.removed) bindings.push(d.binding_id);
    }
  }
  await Promise.all(bindings.map(async id => {
    try {
      windowsMap[id] = await api('/v1/admin/devices/' + id + '/monitored-windows');
    } catch {
      windowsMap[id] = { windows: [], alert_mode: 'no_movement_detected', timezone: '' };
    }
  }));
  return windowsMap;
}

async function renderManage() {
  const qs = new URLSearchParams({
    q: userSearchQ,
    filter: userFilter,
    limit: String(manageLimit),
    offset: String(manageOffset),
  });
  const [data, dashboard] = await Promise.all([
    api('/v1/admin/users?' + qs.toString()),
    api('/v1/admin/dashboard'),
  ]);
  let detailHtml = '';
  if (expandedUserId) {
    try {
      const u = await api('/v1/admin/users/' + expandedUserId);
      const windowsMap = await fetchMonitoredWindowsMap(u);
      detailHtml = renderUserDetail(u, windowsMap);
    } catch (e) {
      detailHtml = `<p class="status-down">${e.message}</p>`;
    }
  }

  const rows = (data.users || []).map(u => {
    const expanded = u.id === expandedUserId;
    const adminChip = u.console_admin ? ' <span class="chip admin">admin</span>' : '';
    return `<tr class="user-row ${expanded ? 'expanded' : ''}" data-user-toggle="${u.id}">
      <td><span class="row-chevron" aria-hidden="true">▶</span> ${u.email}${adminChip}</td>
      <td>${u.display_name || '—'}</td>
      <td>${u.disabled_at ? '<span class="status-down">disabled</span>' : 'active'}</td>
      <td class="muted">${fmt(u.last_login_at)}</td>
      <td>${u.households} hh · ${u.devices} dev</td>
      <td><span class="chip">${u.subscription_summary || (u.devices ? '—' : 'no devices')}</span></td>
    </tr>
    ${expanded ? `<tr><td colspan="6"><div class="card" style="margin:.5rem 0">${detailHtml}</div></td></tr>` : ''}`;
  }).join('');

  const filterOpts = [
    ['email', 'Email / name'],
    ['device_id', 'Device ID'],
    ['expired_trial', 'Expired trial'],
    ['failed_payment', 'Failed payment'],
  ].map(([v, l]) => `<option value="${v}" ${userFilter === v ? 'selected' : ''}>${l}</option>`).join('');

  const countsHtml = renderCountWidgets(dashboard.counts || {});
  const total = data.total || 0;
  const paginationHtml = renderPagination('manage', total, manageLimit, manageOffset);

  return `${countsHtml}
    <div class="toolbar card">
      <input id="user-q" type="search" value="${userSearchQ.replace(/"/g, '&quot;')}" placeholder="Search…" />
      <select id="user-filter">${filterOpts}</select>
      <button class="action" data-user-search>Search</button>
      <button class="action" data-open-add-user>+ Add user</button>
    </div>
    <p class="muted">Click a row to expand user details, households, devices, and payments.</p>
    <div class="card" style="padding:0">
      <table>
        <thead><tr><th>Email</th><th>Name</th><th>Status</th><th>Last login</th><th>Summary</th><th>Subscriptions</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="6" class="muted" style="padding:1rem">No users</td></tr>'}</tbody>
      </table>
      ${paginationHtml}
    </div>`;
}

async function renderStatus() {
  const data = await api('/v1/admin/status');
  const host = data.host || {};
  const cpus = host.cpus || [];
  const mem = host.memory || {};
  const storage = host.storage || {};
  const net = host.network || {};

  const gauges = [];
  let gaugeTone = 0;
  cpus.forEach((c, i) => {
    gauges.push(needleGauge(c.usage_pct, c.id || ('CPU ' + (i + 1)), '', gaugeTone++));
  });
  if (mem.used_pct != null || mem.total_bytes) {
    gauges.push(needleGauge(mem.used_pct, 'Memory', `${formatBytes(mem.used_bytes)} / ${formatBytes(mem.total_bytes)}`, gaugeTone++));
  }
  if (storage.used_pct != null || storage.total_bytes) {
    const mount = storage.mount ? ` · ${storage.mount}` : '';
    gauges.push(needleGauge(storage.used_pct, 'Storage', `${formatBytes(storage.used_bytes)} / ${formatBytes(storage.total_bytes)}${mount}`, gaugeTone++));
  }
  if (net.throughput_pct != null || net.rx_bytes_per_sec != null) {
    const rx = formatBytes(net.rx_bytes_per_sec) + '/s';
    const tx = formatBytes(net.tx_bytes_per_sec) + '/s';
    gauges.push(needleGauge(net.throughput_pct, 'Network', `↓ ${rx} · ↑ ${tx}`, gaugeTone++));
  }

  const gaugeHtml = gauges.length
    ? `<div class="gauge-grid">${gauges.join('')}</div>`
    : '<p class="muted" style="margin-bottom:1rem">Host metrics unavailable on this platform.</p>';

  const cards = (data.services || []).map(s => `
    <div class="status-card">
      <strong>${s.name}</strong>
      <div class="status-label status-${s.status}">${s.status}</div>
      <div class="muted">${s.detail || ''}</div>
    </div>`).join('');

  const updated = host.updated_at ? `<span class="muted"> · updated ${fmt(host.updated_at)}</span>` : '';

  return `<h2>Status${updated}</h2>
    ${gaugeHtml}
    <h3 style="margin:.75rem 0 .45rem;font-size:.95rem">Services</h3>
    <div class="status-grid">${cards || '<p class="muted">No services</p>'}</div>`;
}

function renderCountWidgets(counts) {
  const labels = {
    users: 'Users',
    households: 'Households',
    devices: 'Devices',
    trialing: 'Trialing',
    alerts: 'Active alerts',
  };
  const order = ['users', 'households', 'devices', 'trialing', 'alerts'];
  const entries = order.filter(k => counts[k] != null).map(k => [k, counts[k]]);
  for (const [k, v] of Object.entries(counts)) {
    if (!order.includes(k)) entries.push([k, v]);
  }
  return `<div class="counts manage-counts">
    ${entries.map(([k, v], i) => {
      const tones = ['count-tone-blue', 'count-tone-cyan', 'count-tone-yellow', 'count-tone-red'];
      return `<div class="count ${tones[i % tones.length]}"><strong>${v}</strong>${labels[k] || k}</div>`;
    }).join('')}
  </div>`;
}

async function renderAudit() {
  const qs = new URLSearchParams({
    q: auditSearchQ,
    limit: String(auditLimit),
    offset: String(auditOffset),
  });
  const data = await api('/v1/admin/audit-log?' + qs.toString());
  const lines = (data.entries || []).map(e => `
    <div class="audit-line">
      <span class="muted">${fmt(e.created_at)}</span> — ${e.message || e.action}
    </div>`).join('');
  const total = data.total || 0;
  const paginationHtml = renderPagination('audit', total, auditLimit, auditOffset);
  return `<h2>Audit log</h2>
    <div class="row">
      <input id="audit-q" value="${auditSearchQ.replace(/"/g, '&quot;')}" placeholder="Search log…" style="flex:1" />
      <button class="action" data-audit-search>Search</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:.85rem 1rem">${lines || '<p class="muted">No entries</p>'}</div>
      ${paginationHtml}
    </div>`;
}

function bindAddFormToggles(panel) {
  panel.querySelectorAll('[data-show-add]').forEach(b => {
    b.onclick = (e) => {
      e.preventDefault();
      e.stopPropagation();
      const id = b.dataset.showAdd;
      panel.querySelector(`[data-add-panel="${id}"]`)?.classList.remove('hidden');
      b.classList.add('hidden');
    };
  });
  panel.querySelectorAll('[data-hide-add]').forEach(b => {
    b.onclick = (e) => {
      e.preventDefault();
      e.stopPropagation();
      const id = b.dataset.hideAdd;
      panel.querySelector(`[data-add-panel="${id}"]`)?.classList.add('hidden');
      panel.querySelector(`[data-show-add="${id}"]`)?.classList.remove('hidden');
    };
  });
}

function bindPanelActions() {
  const panel = document.getElementById('panel');
  bindAddFormToggles(panel);

  panel.querySelector('[data-audit-search]')?.addEventListener('click', async () => {
    auditSearchQ = document.getElementById('audit-q')?.value || '';
    auditOffset = 0;
    panel.innerHTML = await renderAudit();
    bindPanelActions();
  });

  panel.querySelector('[data-user-search]')?.addEventListener('click', async () => {
    userSearchQ = document.getElementById('user-q')?.value || '';
    userFilter = document.getElementById('user-filter')?.value || 'email';
    manageOffset = 0;
    expandedUserId = null;
    panel.innerHTML = await renderManage();
    bindPanelActions();
  });

  panel.querySelector('[data-open-add-user]')?.addEventListener('click', openAddUserModal);

  panel.querySelectorAll('[data-user-toggle]').forEach(row => {
    row.onclick = async () => {
      const id = row.dataset.userToggle;
      expandedUserId = expandedUserId === id ? null : id;
      panel.innerHTML = await renderManage();
      bindPanelActions();
    };
  });

  panel.querySelectorAll('[data-user-delete]').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    if (!confirm('Permanently delete this user account? Households they solely own will be removed.')) return;
    try {
      await api(`/v1/admin/users/${b.dataset.userDelete}`, { method:'DELETE' });
      expandedUserId = null;
      await renderPanel();
    } catch (err) {
      alert(err.message);
    }
  });

  panel.querySelectorAll('[data-user-disable]').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    try {
      await api(`/v1/admin/users/${b.dataset.userDisable}/disable`, { method:'POST' });
      await refreshExpandedUser();
    } catch (err) {
      alert(err.message);
    }
  });

  panel.querySelectorAll('[data-user-enable]').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    try {
      await api(`/v1/admin/users/${b.dataset.userEnable}/enable`, { method:'POST' });
      await refreshExpandedUser();
    } catch (err) {
      alert(err.message);
    }
  });

  panel.querySelectorAll('[data-create-hh]').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    const userId = b.dataset.createHh;
    const name = panel.querySelector(`[data-hh-create-name="${userId}"]`)?.value?.trim();
    const timezone = panel.querySelector(`[data-hh-create-tz="${userId}"]`)?.value?.trim() || '';
    if (!name) return alert('Enter household name');
    try {
      await api('/v1/admin/households', {
        method:'POST',
        body: JSON.stringify({ name, owner_user_id: userId, timezone: timezone || undefined }),
      });
      expandedUserId = userId;
      await refreshExpandedUser();
    } catch (err) {
      alert(err.message);
    }
  });

  panel.querySelectorAll('[data-hh-delete]').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    if (!confirm('Archive this household and remove its devices?')) return;
    try {
      await api(`/v1/admin/households/${b.dataset.hhDelete}`, { method:'DELETE' });
      await refreshExpandedUser();
    } catch (err) {
      alert(err.message);
    }
  });

  panel.querySelectorAll('[data-member-add]').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    const hhId = b.dataset.memberAdd;
    const email = panel.querySelector(`[data-member-email="${hhId}"]`)?.value?.trim();
    const role = panel.querySelector(`[data-member-role="${hhId}"]`)?.value || 'caregiver';
    const invite = panel.querySelector(`[data-member-invite="${hhId}"]`)?.checked;
    if (!email) return alert('Enter email');
    try {
      await api(`/v1/admin/households/${hhId}/members`, {
        method:'POST', body: JSON.stringify({ email, role, invite_if_missing: invite })
      });
      await refreshExpandedUser();
    } catch (err) {
      alert(err.message);
    }
  });

  panel.querySelectorAll('[data-member-remove]').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    if (!confirm('Remove this member from household?')) return;
    const { memberRemove: userId, hhId } = b.dataset;
    try {
      await api(`/v1/admin/households/${hhId}/members/${userId}`, { method:'DELETE' });
      await refreshExpandedUser();
    } catch (err) {
      alert(err.message);
    }
  });

  panel.querySelectorAll('[data-prov-device]').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    const hhId = b.dataset.provDevice;
    const device_id = panel.querySelector(`[data-prov-device-id="${hhId}"]`)?.value?.trim();
    const enrollment_secret = panel.querySelector(`[data-prov-secret="${hhId}"]`)?.value?.trim();
    const display_name = panel.querySelector(`[data-prov-name="${hhId}"]`)?.value?.trim();
    const room_or_location_label = panel.querySelector(`[data-prov-room="${hhId}"]`)?.value?.trim();
    if (!device_id || !enrollment_secret) return alert('Device ID and enrollment secret required');
    try {
      await api(`/v1/admin/households/${hhId}/devices`, {
        method:'POST', body: JSON.stringify({ device_id, enrollment_secret, display_name, room_or_location_label })
      });
      await refreshExpandedUser();
    } catch (err) {
      alert(err.message);
    }
  });

  panel.querySelectorAll('[data-dev-unprovision]').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    if (!confirm('Unprovision device in VNMS?')) return;
    try {
      await api(`/v1/admin/devices/${b.dataset.devUnprovision}/unprovision`, { method:'POST' });
      await refreshExpandedUser();
    } catch (err) {
      alert(err.message);
    }
  });

  panel.querySelectorAll('[data-dev-delete]').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    if (!confirm('Delete device binding from household?')) return;
    try {
      await api(`/v1/admin/devices/${b.dataset.devDelete}`, { method:'DELETE' });
      await refreshExpandedUser();
    } catch (err) {
      alert(err.message);
    }
  });

  panel.querySelectorAll('[data-dev-trial]').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    const id = b.dataset.devTrial;
    const days = parseInt(panel.querySelector(`[data-trial-days="${id}"]`)?.value, 10);
    if (!days || days < 1) return alert('Enter valid days');
    try {
      await api(`/v1/admin/devices/${id}/extend-trial`, { method:'POST', body: JSON.stringify({ days }) });
      await refreshExpandedUser();
    } catch (err) {
      alert(err.message);
    }
  });

  panel.querySelectorAll('[data-dev-activate]').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    try {
      await api(`/v1/admin/devices/${b.dataset.devActivate}/activate-subscription`, { method:'POST', body: JSON.stringify({ months: 1 }) });
      await refreshExpandedUser();
    } catch (err) {
      alert(err.message);
    }
  });

  panel.querySelectorAll('[data-mw-save]').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    const id = b.dataset.mwSave;
    const start1 = panel.querySelector(`[data-mw-start1="${id}"]`)?.value || '';
    const end1 = panel.querySelector(`[data-mw-end1="${id}"]`)?.value || '';
    const start2 = panel.querySelector(`[data-mw-start2="${id}"]`)?.value || '';
    const end2 = panel.querySelector(`[data-mw-end2="${id}"]`)?.value || '';
    const alert_mode = panel.querySelector(`[data-mw-alert="${id}"]`)?.value || 'no_movement_detected';
    const windows = [];
    if (start1 && end1) windows.push({ start_time: start1.slice(0, 5), end_time: end1.slice(0, 5) });
    if (start2 && end2) windows.push({ start_time: start2.slice(0, 5), end_time: end2.slice(0, 5) });
    try {
      await api(`/v1/admin/devices/${id}/monitored-windows`, {
        method: 'PUT',
        body: JSON.stringify({ windows, alert_mode }),
      });
      await refreshExpandedUser();
    } catch (err) {
      alert(err.message);
    }
  });

  bindPagination(panel);
}

document.getElementById('modal-create-user')?.addEventListener('click', async () => {
  const email = document.getElementById('modal-user-email')?.value?.trim();
  const password = document.getElementById('modal-user-password')?.value || '';
  const display_name = document.getElementById('modal-user-name')?.value?.trim();
  const account_type = document.getElementById('modal-user-type')?.value || 'user';
  const msg = document.getElementById('modal-user-msg');
  if (!email || password.length < 8) {
    if (msg) { msg.textContent = 'Email and password (min 8 chars) required.'; msg.className = 'status-down'; }
    return;
  }
  try {
    const res = await api('/v1/admin/users', {
      method:'POST',
      body: JSON.stringify({ email, password, display_name, account_type })
    });
    closeAddUserModal();
    activeTab = 'manage';
    expandedUserId = res.user?.id || null;
    userSearchQ = email;
    manageOffset = 0;
    renderTabs();
    await renderPanel();
  } catch (err) {
    if (msg) { msg.textContent = err.message; msg.className = 'status-down'; }
  }
});

tryBoot();
</script>
